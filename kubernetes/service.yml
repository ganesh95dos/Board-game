apiVersion: v1
kind: Service
metadata:
  name: board-game-svc
  namespace: board-game        
  labels:
    app: board-game
spec:
  type: NodePort
  selector:
    app: board-game
  ports:
    - name: http-main
      port: 80
      targetPort: 8080
      nodePort: 30080

    - name: http-db
      port: 81
      targetPort: 81
      nodePort: 30081
